entry: lowlevel_episode
python: /home/azvm/miniconda3/envs/verl/bin/python
runner:
  print_command: false
env:
  JAVA_HOME: /usr
args:
  task_index: 0
  task_mode: single_agent
  controlled_agent: AgentB
  atomic_role: elevator_door_approach
  policy: ai
  agent_b_provider: closed_api
  agent_b_model: gpt-5.5-20260424
  agent_b_api_base_url:
  agent_b_api_key:
  agent_b_api_key_env:
  agent_temperature: 0
  agent_max_tokens: 4096
  config: yaml/instance_single.yaml
  max_steps: 32
  action_ticks: 4
  capture_ticks: 2
  capture_render_frames: 2
  capture_timeout: 90
  camera_settle_ticks: 10
  camera_settle_render_frames: 6
  pov_eye_height: 1.35
  pov_forward_offset: 0.25
  pov_camera_settle_ticks: 16
  pov_extra_settle_ticks: 8
  pov_settle_render_frames: 10
  agent_pov_mode: camera_entity
  fps: 2
  write_video: false
  fail_on_video_error: false
  hide_hud: true
  refresh_pack: false
  randomize_starts: false
  random_seed:
  start_position_jitter: 0.4
  start_yaw_jitter: 45
  start_pitch_min: 20
  start_pitch_max: 40
  output: runs/gpt55_elevator_door_result.json
  frames_dir: runs/gpt55_elevator_door_observer_frames
  qwen_frames_dir: runs/gpt55_elevator_door_agent_pov_frames
  video_output: runs/gpt55_elevator_door_rollout.mp4
