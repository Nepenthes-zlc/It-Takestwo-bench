entry: lowlevel_batch
python: /home/azvm/miniconda3/envs/verl/bin/python
runner:
  print_command: false
env:
  JAVA_HOME: /usr
  IT_TAKETWO_QUIET_MC_LOGS: 1
args:
  config: yaml/instances_batch_keep_running.yaml
  task_indices: "78,73,63,31"
  episodes_per_task: 1
  parallel: 1
  task_mode: single_agent
  controlled_agent: AgentB
  atomic_role: elevator_door_approach
  policy: ai
  agent_b_provider: openai_compatible
  agent_b_model: gpt-5.5
  agent_b_api_base_url: http://127.0.0.1:23333/api/openai/v1
  agent_b_api_key: dummy
  agent_b_api_key_env:
  agent_temperature: 0
  agent_max_tokens: 0
  agent_api_max_retries: 6
  agent_api_retry_delay: 1
  max_steps: 32
  action_ticks: 4
  capture_ticks: 2
  capture_render_frames: 2
  capture_timeout: 90
  camera_settle_ticks: 10
  camera_settle_render_frames: 6
  pov_eye_height: 1.35
  pov_forward_offset: 0.25
  pov_camera_settle_ticks: 16
  pov_extra_settle_ticks: 8
  pov_settle_render_frames: 10
  agent_pov_mode: camera_entity
  fps: 2
  write_video: false
  record_observer: false
  fail_on_video_error: false
  hide_hud: true
  refresh_pack: false
  randomize_starts: false
  random_seed:
  start_position_jitter: 0.4
  start_yaw_jitter: 45
  start_pitch_min: 20
  start_pitch_max: 40
  output_dir: runs/gpt55_elevator_door_hard4_agentmaestro_max32
